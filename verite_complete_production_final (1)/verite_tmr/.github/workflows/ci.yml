name: "Vérité TMR CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr ffmpeg libsndfile1
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Type checking (mypy)
        run: mypy src/verite_tmr/ --ignore-missing-imports || true
      - name: Lint (ruff)
        run: ruff check src/verite_tmr/
      - name: Unit tests
        run: pytest tests/ -v --tb=short -m "not slow and not hardware"
      - name: Correctness tests
        run: pytest tests/test_correctness.py -v --tb=long -m "not slow"

  latency-regression:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Phase estimation latency test (CausalPhaseEstimator — recommended)
        run: |
          python -c "
          import time
          from verite_tmr.phase.echt import CausalPhaseEstimator
          import numpy as np

          est = CausalPhaseEstimator(fs=250, buffer_s=4.0)
          for i in range(500):
              est.push_and_estimate(np.cos(2 * np.pi * 0.75 * i / 250))

          times = []
          for i in range(500, 1500):
              t0 = time.perf_counter()
              est.push_and_estimate(np.cos(2 * np.pi * 0.75 * i / 250))
              times.append((time.perf_counter() - t0) * 1000)

          p95 = np.percentile(times, 95)
          mean = np.mean(times)
          print(f'CausalPhaseEstimator latency: mean={mean:.2f}ms, p95={p95:.2f}ms')
          assert p95 < 50, f'CausalPhaseEstimator p95 latency {p95:.2f}ms exceeds 50ms budget!'
          print('✅ Latency regression test PASSED')
          "
      - name: ECHTEstimator latency test (secondary — for publication reproducibility)
        run: |
          python -c "
          import time
          from verite_tmr.phase.echt import ECHTEstimator
          import numpy as np
          est = ECHTEstimator(fs=250)
          for i in range(500):
              est.push_and_estimate(np.cos(2 * np.pi * 0.75 * i / 250))
          times = []
          for i in range(500, 1000):
              t0 = time.perf_counter()
              est.push_and_estimate(np.cos(2 * np.pi * 0.75 * i / 250))
              times.append((time.perf_counter() - t0) * 1000)
          p95 = np.percentile(times, 95)
          print(f'ECHTEstimator latency: mean={np.mean(times):.2f}ms, p95={p95:.2f}ms')
          assert p95 < 50, f'ECHT p95 {p95:.2f}ms exceeds 50ms'
          print('✅ ECHT latency PASSED')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t verite-tmr:latest .
      - name: Test Docker image
        run: docker run --rm verite-tmr:latest verite validate --mode simulation
