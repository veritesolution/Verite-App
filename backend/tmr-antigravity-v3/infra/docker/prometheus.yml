global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: tmr-antigravity

scrape_configs:
  - job_name: tmr-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: celery
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"
